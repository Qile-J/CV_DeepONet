NeuralNetwork:
  device: gpu
  test_percentage: 50
  
  # Per-model configurations
  models:
    Ex:
      n_epochs: 30001
      learning_rate: 0.001
      end_learning_rate: 0.0001
      decay_steps: 10000
      decay_power: 0.05
